<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KickOff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="background-page d-flex flex-column min-vh-100 p-0">
    <header>
        <div class="container">
            <nav id="navbar" class="navbar navbar-expand-lg border-0">
                <div class="container-fluid p-0">
                    <a href="index.html" class="navbar-brand logo">
                        <h2 class="mb-0 text-white"><i class="fas fa-trophy"></i> KickOff</h2>
                    </a>
                    
                    <button class="navbar-toggler btn-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                        <i class="fas fa-bars"></i>
                    </button>

                    <div class="collapse navbar-collapse justify-content-end" id="navContent">
                        <ul class="navbar-nav align-items-lg-center gap-3 mb-0" id="nav-links">
                            <li class="nav-item" id="auth-link">
                                <a href="index.html" class="btn btn-outline-light px-4">Back to Home</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center mt-3 py-5">
        <div class="card col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5 text-navy shadow-lg p-4 rounded-4 mt-5">
            <div class="text-center mb-4">
                <h2 class="text-navy fw-bold mb-2"><i class="fas fa-user-plus me-2"></i>Join the League</h2>
                <p class="text-muted mb-0">Start your journey as a football manager today.</p>
            </div>
            
            <form id="register-form" novalidate>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" id="username" class="form-control form-control" placeholder="Choose a username">
                    <p id="error-username" class="error-message d-none">Username is required</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" id="email" class="form-control form-control" placeholder="manager@example.com">
                    <p id="error-email" class="error-message d-none">Valid email is required</p>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control form-control" placeholder="••••••••">
                    <p id="error-password" class="error-message d-none">Password is required (min 6 chars)</p>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control form-control" placeholder="••••••••">
                    <p id="error-confirm-password" class="error-message d-none">Confirm Password is required</p>
                </div>
                
                <p id="error-message" class="error-message text-center d-none"></p>
                
                <button type="submit" class="btn btn-dark btn-lg w-100">Register Account</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0">Already have an account? <a href="login.html" class="text-navy fw-semibold text-decoration-none">Login Here</a></p>
            </div>
        </div>
    </main>

    <!-- Global Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="messageModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass modal-glass-border">
          <div class="modal-header border-0">
            <h2 class="h5 text-white" id="messageModalLabel">Message</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center text-white p-4">
            <p id="modal-message-text" class="mb-0">Message</p>
          </div>
          <div class="modal-footer border-0 justify-content-center">
            <button type="button" class="btn btn-dark " data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/getCurrentURL.js"></script>
    <script src="js/core/queryCmds.js"></script>
    <script src="js/core/uiHelpers.js"></script>
    <script src="js/auth/registerUser.js"></script>
</body>
</html>
