<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Challenges | KickOff Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="background-page d-flex flex-column min-vh-100">
    <header>
        <div class="container">
            <nav id="navbar" class="navbar navbar-expand-lg border-0 py-3">
                <div class="container-fluid p-0">
                    <a href="index.html" class="navbar-brand logo">
                        <h2 class="mb-0 text-white"><i class="fas fa-trophy"></i> KickOff</h2>
                    </a>
                    
                    <button class="navbar-toggler btn-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                        <i class="fas fa-bars"></i>
                    </button>

                    <div class="collapse navbar-collapse justify-content-end" id="navContent">
                        <ul class="navbar-nav align-items-lg-center gap-3 mb-0" id="nav-links">
                            <li class="nav-item" id="auth-link">
                                <a href="login.html" class="btn btn-white  px-4">Login</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container flex-grow-1 mt-5 py-5">
        <div class="d-flex justify-content-start mt-4 mb-4">
            <a href="admin.html" class="btn-white">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="m-4">
            <div class="d-flex align-items-center justify-content-center gap-4">
                <i class="fas fa-bullseye title-icon"></i>
                <div>
                    <div class="d-flex align-items-center justify-content-center gap-4">
                        <div class="subtitle-line"></div>
                        <span class="subtitle-text">ADMIN</span>
                        <div class="subtitle-line"></div>
                    </div>
                    <h1 class="main-title">CHALLENGES MANAGEMENT</h1>
                    <div class="underline"></div>
                </div>
            </div>
            <div class="d-flex justify-content-center mt-4">
                <button class="btn btn-white d-flex align-items-center gap-2" onclick="location.href='createChallenge.html?returnUrl='+encodeURIComponent(window.location.href)">
                    <i class="fas fa-plus"></i> Create New Challenge
                </button>
            </div>
        </div>

        <div class="table-glass rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="px-3">No.</th>
                            <th>Title</th>
                            <th class="d-none d-lg-table-cell">Description</th>
                            <th>Points</th>
                            <th class="d-none d-lg-table-cell">Created By</th>
                            <th class="text-end pe-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="challenge-admin-list">
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="py-5">
                                    <div class="loader-ball">
                                        <i class="fas fa-futbol"></i>
                                    </div>
                                    <p class="text-white opacity-75 mb-0">Loading challenges...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div id="challenge-pager"></div>
    </main>

    <footer class="mt-auto bg-navy p-3 border-top border-1 border-dark">
        <div class="container text-center">
            <p class="text-white fw-semibold mb-0">&copy; 2026 KickOff. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Global Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass modal-glass-border">
          <div class="modal-header border-0">
            <div class="text-white">System Message</div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center text-white p-4">
            <p id="modal-message-text" class="mb-0"></p>
          </div>
          <div class="modal-footer border-0 justify-content-center">
            <button type="button" class="btn btn-dark " data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/getCurrentURL.js"></script>
    <script src="js/core/queryCmds.js"></script>
    <script src="js/core/uiHelpers.js"></script>
    <script src="js/core/adminHelpers.js"></script>
    <script src="js/core/userNavbarToggle.js"></script>
    <script src="js/admin/adminChallenges.js"></script>
</body>
</html>
