<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Market - KickOff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="background-page d-flex flex-column min-vh-100">
    <header>
        <div class="container">
            <nav id="navbar" class="navbar navbar-expand-lg border-0 py-3">
                <div class="container-fluid p-0">
                    <a href="index.html" class="navbar-brand logo">
                        <h2 class="mb-0 text-white"><i class="fas fa-trophy"></i> KickOff</h2>
                    </a>
                    
                    <button class="navbar-toggler btn-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                        <i class="fas fa-bars"></i>
                    </button>

                    <div class="collapse navbar-collapse justify-content-end" id="navContent">
                        <ul class="navbar-nav align-items-lg-center gap-3 mb-0">
                            <li class="nav-item" id="auth-link">
                                <a href="login.html" class="btn btn-white  px-4">Login</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container flex-grow-1 mt-3 py-5">
        <div class="my-5">
            <div class="d-flex align-items-center justify-content-center gap-4">
                <i class="fas fa-store title-icon"></i>
                <div>
                    <div class="d-flex align-items-center justify-content-center gap-4">
                        <div class="subtitle-line"></div>
                        <span class="subtitle-text">TRANSFER</span>
                        <div class="subtitle-line"></div>
                    </div>
                    <h1 class="main-title">MARKET</h1>
                    <div class="underline"></div>
                </div>
            </div>
        </div>

        <div id="market-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <!-- Catalogue items will be loaded here -->
            <div class="col-12 d-flex flex-column justify-content-center align-items-center w-100">
                <div class="loader-ball">
                    <i class="fas fa-futbol"></i>
                </div>
                <p class="text-white text-opacity-75">Loading market...</p>
            </div>
        </div>

        <div id="market-pager"></div>
    </main>

    <footer class="mt-auto bg-navy p-3 border-top border-1 border-dark">
        <div class="container text-center">
            <p class="text-white fw-semibold mb-0">&copy; 2026 KickOff. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="messageModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass modal-glass-border">
          <div class="modal-header border-0">
            <h2 class="h5 text-white" id="messageModalLabel">Message</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center text-white p-4">
            <p id="modal-message-text" class="mb-0">Message</p>
          </div>
          <div class="modal-footer border-0 justify-content-center">
            <button type="button" class="btn btn-dark " data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/getCurrentURL.js"></script>
    <script src="js/core/queryCmds.js"></script>
    <script src="js/core/uiHelpers.js"></script>
    <script src="js/core/userNavbarToggle.js"></script>
    <script src="js/core/playerHelpers.js"></script>
    <script src="js/features/players/showAllCatalogue.js"></script>
</body>
</html>
