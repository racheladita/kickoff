<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Challenge | KickOff Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="background-page d-flex flex-column min-vh-100">
    <header>
        <div class="container">
            <nav id="navbar" class="navbar navbar-expand-lg border-0 py-3">
                <div class="container-fluid p-0">
                    <a href="index.html" class="navbar-brand logo">
                        <h2 class="mb-0 text-white"><i class="fas fa-trophy"></i> KickOff</h2>
                    </a>
                    
                    <button class="navbar-toggler btn-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
                        <i class="fas fa-bars"></i>
                    </button>

                    <div class="collapse navbar-collapse justify-content-end" id="navContent">
                        <ul class="navbar-nav align-items-lg-center gap-3 mb-0" id="nav-links">
                            <li class="nav-item" id="auth-link">
                                <a href="login.html" class="btn btn-white  px-4">Login</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container flex-grow-1 mt-5 py-5">
        <div class="d-flex justify-content-start mt-4 mb-4">
            <a href="adminChallenges.html" class="btn-white" id="back-link">
                <i class="fas fa-arrow-left"></i> Back to Challenges
            </a>
        </div>

        <div class="mb-3">
            <div class="d-flex align-items-center justify-content-center gap-4">
                <i class="fas fa-bullseye title-icon"></i>
                <div>
                    <div class="d-flex align-items-center justify-content-center gap-4">
                        <div class="subtitle-line"></div>
                        <span class="subtitle-text">EDIT</span>
                        <div class="subtitle-line"></div>
                    </div>
                    <h1 class="main-title">CHALLENGE</h1>
                    <div class="underline"></div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="table-glass p-5 rounded-4">
                    <form id="challenge-form" novalidate>
                        <input type="hidden" id="challenge-id">
                        <div class="mb-4">
                            <label class="form-label text-white small opacity-75 fw-bold">Challenge Title</label>
                            <input type="text" id="challenge-title" class="form-control" required placeholder="e.g. 10k Steps Daily">
                            <p id="error-title" class="error-message d-none mt-1">Title is required</p>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white small opacity-75 fw-bold">Description</label>
                            <textarea id="challenge-description" class="form-control" rows="4" required placeholder="Detail the challenge requirement..."></textarea>
                            <p id="error-description" class="error-message d-none mt-1">Description is required</p>
                        </div>
                        <div class="mb-5">
                            <label class="form-label text-white small opacity-75 fw-bold">Reward Points</label>
                            <input type="number" id="challenge-points" class="form-control" placeholder="e.g. 500" required min="10" value="0">
                            <p id="error-points" class="error-message d-none mt-1">Points must be at least 10</p>
                        </div>
                        <div class="d-flex gap-3 justify-content-center">
                            <a href="adminChallenges.html" class="btn btn-pink px-4" id="cancel-link">Cancel</a>
                            <button type="submit" class="btn btn-white px-5">Update Challenge</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto bg-navy p-3 border-top border-1 border-dark">
        <div class="container text-center">
            <p class="text-white fw-semibold mb-0">&copy; 2026 KickOff. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Global Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass modal-glass-border">
          <div class="modal-header border-0">
            <div class="text-white">System Message</div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center text-white p-4">
            <p id="modal-message-text" class="mb-0"></p>
          </div>
          <div class="modal-footer border-0 justify-content-center">
            <button type="button" class="btn btn-dark " data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/getCurrentURL.js"></script>
    <script src="js/core/queryCmds.js"></script>
    <script src="js/core/uiHelpers.js"></script>
    <script src="js/core/adminHelpers.js"></script>
    <script src="js/core/userNavbarToggle.js"></script>
    <script src="js/admin/editChallenge.js"></script>
</body>
</html>
